name: frontend-ci

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"

    steps:
      - name: 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트
        run: npm test -- --watchAll=false

      - name: 운영 빌드
        run: npm run build

      - name: 운영 API 주소 포함 여부 검증
        run: |
          grep --recursive --quiet 'http://43.200.20.216/ai' build/static/js
          grep --recursive --quiet 'http://43.200.20.216' build/static/js
