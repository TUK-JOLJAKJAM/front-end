name: frontend-ci-pages

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: "true"

    steps:
      - name: 체크아웃
        uses: actions/checkout@v5

      - name: Node.js 설정
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: 의존성 설치
        run: npm ci

      - name: 테스트
        run: npm test -- --watchAll=false

      - name: 운영 빌드
        run: npm run build

      - name: 운영 API 주소 포함 여부 검증
        run: |
          grep --recursive --quiet 'https://43.200.20.216.sslip.io/ai' build/static/js
          grep --recursive --quiet 'https://43.200.20.216.sslip.io' build/static/js

      - name: Pages 배포 파일 업로드
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build

  deploy:
    if: github.event_name != 'pull_request'
    needs: test-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v5

      - name: 공개 페이지 스모크 테스트
        run: |
          curl --fail --silent --show-error --retry 20 --retry-all-errors --retry-delay 3 \
            "${{ steps.deployment.outputs.page_url }}" | grep --quiet '<title>ReFit Analysis</title>'
